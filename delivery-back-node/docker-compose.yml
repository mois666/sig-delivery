services:
  mysql:
    image: mysql:8.0
    container_name: delivery-node
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: delivery_app
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: delivery-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
